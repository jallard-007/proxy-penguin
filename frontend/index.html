<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <script>
      (function () {
        const saved = localStorage.getItem("themePreference");
        const systemDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;

        const resolvedTheme =
          saved === "light" || saved === "dark"
            ? saved
            : systemDark
            ? "dark"
            : "light";

        document.documentElement.classList.toggle("dark", resolvedTheme === "dark");
      })();
    </script>

    <title>Proxy Penguin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F427;</text></svg>">

  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="src/main.jsx"></script>
  </body>
</html>
