<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Penguin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐧</text></svg>">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --info: #79c0ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .status {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--warning);
        }

        .status-dot.connected { background: var(--success); }
        .status-dot.disconnected { background: var(--danger); }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .toolbar input, .toolbar select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        .toolbar input:focus, .toolbar select:focus {
            border-color: var(--accent);
        }

        .toolbar input { width: 140px; }

        .toolbar button {
            background: var(--border);
            border: none;
            color: var(--text);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .toolbar button:hover { background: var(--text-muted); }

        .toolbar .spacer { flex: 1; }

        .toolbar .count {
            font-size: 13px;
            color: var(--text-muted);
        }

        .table-wrap {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 1;
        }

        th {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        th:hover { color: var(--text); }
        th.sorted { color: var(--accent); }

        td {
            padding: 6px 12px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, Consolas, monospace;
            font-size: 12px;
        }

        tr:hover td { background: #1c2128; }

        tr.group-header td {
            background: var(--surface);
            font-weight: 600;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 13px;
            color: var(--accent);
            padding: 10px 12px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-2xx { background: rgba(63,185,80,0.15); color: var(--success); }
        .status-3xx { background: rgba(121,192,255,0.15); color: var(--info); }
        .status-4xx { background: rgba(210,153,34,0.15); color: var(--warning); }
        .status-5xx { background: rgba(248,81,73,0.15); color: var(--danger); }

        @keyframes flash {
            from { background: rgba(88,166,255,0.1); }
            to { background: transparent; }
        }

        tr.new-row td { animation: flash 1s ease-out; }

        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 360px;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 20px;
        }

        .login-box input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

        .login-box input:focus { border-color: var(--accent); }

        .login-box button {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .login-box button:hover { opacity: 0.9; }
        .login-box button:disabled { opacity: 0.5; cursor: not-allowed; }

        #login-error {
            color: var(--danger);
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h2>&#x1F427; Proxy Penguin</h2>
            <form id="login-form">
                <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" required>
                <button type="submit">Authenticate</button>
                <p id="login-error"></p>
            </form>
        </div>
    </div>

    <header>
        <h1>&#x1F427; Proxy Penguin</h1>
        <div style="display:flex;align-items:center;gap:16px;">
            <button id="btn-logout" style="display:none;background:var(--border);border:none;color:var(--text);padding:5px 12px;border-radius:6px;font-size:13px;cursor:pointer;">Logout</button>
            <div class="status">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Connecting...</span>
            </div>
        </div>
    </header>

    <div class="toolbar">
        <input id="f-hostname" placeholder="Hostname..." title="Filter by hostname">
        <input id="f-path" placeholder="Path..." title="Filter by path">
        <input id="f-ip" placeholder="Client IP..." title="Filter by client IP">
        <input id="f-status" placeholder="Status..." title="Filter by status code">
        <button id="btn-clear">Clear</button>
        <div class="spacer"></div>
        <label style="font-size:13px;color:var(--text-muted);">Group:
            <select id="group-by">
                <option value="">None</option>
                <option value="hostname">Hostname</option>
                <option value="status">Status</option>
                <option value="clientIp">Client IP</option>
            </select>
        </label>
        <span class="count" id="count"></span>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th data-field="timestamp">Time</th>
                    <th data-field="hostname">Hostname</th>
                    <th data-field="path">Path</th>
                    <th data-field="clientIp">Client IP</th>
                    <th data-field="status">Status</th>
                    <th data-field="durationMs">Duration</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <script>
    (() => {
        const MAX_RECORDS = 5000;
        let records = [];
        let sort = { field: 'timestamp', dir: 'desc' };
        let groupBy = '';
        let filters = { hostname: '', path: '', clientIp: '', status: '' };
        let newIds = new Set();

        const tbody = document.getElementById('tbody');
        const countEl = document.getElementById('count');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        // Filters
        const fHostname = document.getElementById('f-hostname');
        const fPath = document.getElementById('f-path');
        const fIp = document.getElementById('f-ip');
        const fStatus = document.getElementById('f-status');
        const groupSelect = document.getElementById('group-by');
        const btnClear = document.getElementById('btn-clear');

        let debounceTimer;
        function onFilterChange() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                filters.hostname = fHostname.value.toLowerCase();
                filters.path = fPath.value.toLowerCase();
                filters.clientIp = fIp.value;
                filters.status = fStatus.value;
                render();
            }, 150);
        }

        fHostname.addEventListener('input', onFilterChange);
        fPath.addEventListener('input', onFilterChange);
        fIp.addEventListener('input', onFilterChange);
        fStatus.addEventListener('input', onFilterChange);

        groupSelect.addEventListener('change', () => {
            groupBy = groupSelect.value;
            render();
        });

        btnClear.addEventListener('click', () => {
            fHostname.value = '';
            fPath.value = '';
            fIp.value = '';
            fStatus.value = '';
            filters = { hostname: '', path: '', clientIp: '', status: '' };
            render();
        });

        // Sorting
        document.querySelectorAll('th[data-field]').forEach(th => {
            th.addEventListener('click', () => {
                const field = th.dataset.field;
                if (sort.field === field) {
                    sort.dir = sort.dir === 'desc' ? 'asc' : 'desc';
                } else {
                    sort.field = field;
                    sort.dir = 'desc';
                }
                document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
                th.classList.add('sorted');
                render();
            });
        });

        function esc(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function formatTime(ts) {
            const d = new Date(ts);
            const h = String(d.getHours()).padStart(2, '0');
            const m = String(d.getMinutes()).padStart(2, '0');
            const s = String(d.getSeconds()).padStart(2, '0');
            const ms = String(d.getMilliseconds()).padStart(3, '0');
            return `${h}:${m}:${s}.${ms}`;
        }

        function formatDuration(ms) {
            if (ms < 1) return ms.toFixed(2) + 'ms';
            if (ms < 1000) return ms.toFixed(1) + 'ms';
            return (ms / 1000).toFixed(2) + 's';
        }

        function statusClass(code) {
            if (code < 300) return 'status-2xx';
            if (code < 400) return 'status-3xx';
            if (code < 500) return 'status-4xx';
            return 'status-5xx';
        }

        function matchesFilter(r) {
            if (filters.hostname && !r.hostname.toLowerCase().includes(filters.hostname)) return false;
            if (filters.path && !r.path.toLowerCase().includes(filters.path)) return false;
            if (filters.clientIp && !r.clientIp.includes(filters.clientIp)) return false;
            if (filters.status && String(r.status) !== filters.status) return false;
            return true;
        }

        function cmp(a, b) {
            let va = a[sort.field];
            let vb = b[sort.field];
            if (sort.field === 'timestamp') {
                va = new Date(va).getTime();
                vb = new Date(vb).getTime();
            }
            if (va < vb) return sort.dir === 'asc' ? -1 : 1;
            if (va > vb) return sort.dir === 'asc' ? 1 : -1;
            return 0;
        }

        function renderRow(r) {
            const cls = newIds.has(r.id) ? ' class="new-row"' : '';
            return `<tr${cls}>
                <td>${formatTime(r.timestamp)}</td>
                <td>${esc(r.hostname)}</td>
                <td>${esc(r.path)}</td>
                <td>${esc(r.clientIp)}</td>
                <td><span class="badge ${statusClass(r.status)}">${r.status}</span></td>
                <td>${formatDuration(r.durationMs)}</td>
            </tr>`;
        }

        function render() {
            const filtered = records.filter(matchesFilter);
            filtered.sort(cmp);

            let html;
            if (groupBy) {
                const groups = {};
                for (const r of filtered) {
                    const key = String(r[groupBy] || '(empty)');
                    (groups[key] = groups[key] || []).push(r);
                }
                html = '';
                const sortedKeys = Object.keys(groups).sort();
                for (const key of sortedKeys) {
                    html += `<tr class="group-header"><td colspan="6">${esc(key)} &mdash; ${groups[key].length} requests</td></tr>`;
                    for (const r of groups[key]) {
                        html += renderRow(r);
                    }
                }
            } else {
                html = filtered.map(renderRow).join('');
            }

            tbody.innerHTML = html;
            countEl.textContent = filtered.length === records.length
                ? `${records.length} requests`
                : `${filtered.length} / ${records.length} requests`;

            // Clear new-row markers after animation
            if (newIds.size > 0) {
                setTimeout(() => { newIds.clear(); }, 1100);
            }
        }

        // Auth
        const loginOverlay = document.getElementById('login-overlay');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const loginPassword = document.getElementById('login-password');
        const logoutBtn = document.getElementById('btn-logout');
        let authRequired = false;
        let currentES = null;

        // SSE connection
        function connect() {
            if (currentES) currentES.close();
            const es = new EventSource('/api/events/stream');
            currentES = es;

            es.addEventListener('init', (e) => {
                records = JSON.parse(e.data) || [];
                render();
            });

            es.addEventListener('request', (e) => {
                const rec = JSON.parse(e.data);
                newIds.add(rec.id);
                records.push(rec);
                if (records.length > MAX_RECORDS) {
                    records = records.slice(records.length - MAX_RECORDS);
                }
                render();
            });

            es.addEventListener('open', () => {
                statusDot.className = 'status-dot connected';
                statusText.textContent = 'Connected';
            });

            es.addEventListener('auth_expired', () => {
                es.close();
                currentES = null;
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = 'Session expired';
                logoutBtn.style.display = 'none';
                showLogin();
                loginError.textContent = 'Your session has expired. Please log in again.';
            });

            es.addEventListener('error', () => {
                es.close();
                currentES = null;
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = 'Reconnecting...';
                if (authRequired) {
                    fetch('/api/auth/check').then(r => {
                        if (r.status === 401) {
                            showLogin();
                        } else {
                            setTimeout(connect, 2000);
                        }
                    }).catch(() => setTimeout(connect, 2000));
                } else {
                    setTimeout(connect, 2000);
                }
            });
        }

        function showLogin() {
            loginOverlay.style.display = 'flex';
            loginError.textContent = '';
            loginPassword.focus();
        }

        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/check');
                const data = await res.json();
                if (!data.authRequired) {
                    connect();
                    return;
                }
                authRequired = true;
                if (res.ok) {
                    logoutBtn.style.display = '';
                    connect();
                } else {
                    showLogin();
                }
            } catch {
                connect();
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginError.textContent = '';
            const btn = loginForm.querySelector('button');
            btn.disabled = true;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        password: loginPassword.value,
                    }),
                });
                const data = await res.json();
                if (res.ok) {
                    loginOverlay.style.display = 'none';
                    loginPassword.value = '';
                    logoutBtn.style.display = '';
                    connect();
                } else {
                    loginError.textContent = data.error || 'Login failed.';
                }
            } catch {
                loginError.textContent = 'Connection error.';
            } finally {
                btn.disabled = false;
            }
        });

        logoutBtn.addEventListener('click', async () => {
            if (currentES) { currentES.close(); currentES = null; }
            try { await fetch('/api/auth/logout', {method: 'POST'}); } catch {}
            logoutBtn.style.display = 'none';
            records = [];
            render();
            statusDot.className = 'status-dot disconnected';
            statusText.textContent = 'Disconnected';
            showLogin();
        });

        checkAuth();
    })();
    </script>
</body>
</html>
